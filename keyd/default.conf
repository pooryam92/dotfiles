# keyd — system-level key remapper (https://github.com/rvaiya/keyd).
# Runs as root at the evdev layer, so remaps apply under any compositor (niri,
# cosmic-comp) and X11 alike, and even at the TTY. This file is the source of
# truth in the dotfiles repo; install.sh copies it to /etc/keyd/default.conf.
#
# Apply changes after editing this file:
#   sudo install -Dm644 keyd/default.conf /etc/keyd/default.conf && sudo keyd reload
#
# overload(layer, key): hold the key = activate `layer` (instantly, so chords
# have no lag); tap-and-release alone = emit `key`. keyd's tap-hold primitive.

[ids]

*

[main]

# CapsLock is Esc when tapped, Ctrl when held; Esc becomes CapsLock.
# (Vim-friendly: Esc on the home row, Ctrl without reaching to the corner.)
capslock = overload(control, esc)
esc = capslock

# Right Alt acts as Super (niri's "Mod"). This laptop's physical Super key is
# dead — a failed switch: it sends no event to Linux at all, though it worked on
# Windows (diagnosed with keyd monitor + libinput; no firmware/BIOS lock).
#
# Right Alt is the donor because it's the least-used key within easy reach: Left
# Alt is untouched, so every Alt chord still works. This costs AltGr — if you
# ever need a layout whose third-level symbols live there, pick another donor.
#
# Deliberately NOT Left Ctrl (the previous choice): that stole a real Ctrl on
# every keyboard, including external ones whose Super key works fine. Keeping the
# remap on a key nobody misses is what lets this file stay a single config with
# '[ids] *' instead of forking per-keyboard. See keyd/README.md.
rightalt = layer(meta)
