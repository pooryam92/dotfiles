"$schema" = 'https://starship.rs/config-schema.json'

add_newline = true
# Cap how long ANY module's external command (git status, python --version, …) may
# run before the prompt renders without it. Kept low because the prompt redraws on
# every Enter, so a slow command here is felt directly as input lag. 200ms is ample
# for git_status in a normal repo (<50ms); anything slower is skipped rather than
# stalling the prompt. Raise it if you work in very large repos and want the status.
command_timeout = 200

# LEFT prompt — where am I + project state. Kept tight; transient info lives on
# the right (see right_format).
format = """
$directory\
$git_branch\
$git_status\
$git_state\
$python\
$jobs\
$line_break\
$status$character"""

# RIGHT prompt — ambient/transient info pushed to the right edge so it never
# crowds what you type: how long the last command took, then a clock.
# Works the same in zsh and PowerShell.
right_format = """$cmd_duration$time"""

[directory]
style = "bold cyan"
truncation_length = 3
truncate_to_repo = true
truncation_symbol = "…/"   # show that the path was shortened, e.g. …/src/app
read_only = " "

[git_branch]
symbol = " "
style = "bold purple"

[git_status]
style = "bold red"

[git_state]
style = "bold yellow"

# The typed-at symbol. Both shells now use emacs-style editing (zsh `bindkey -e`,
# PSReadLine `EditMode=Emacs`) — no modes — so the arrow only encodes the last exit
# code: green ❯ = the last command succeeded, red ❯ = it failed. (No `vimcmd_symbol`
# here anymore: with emacs editing there's no vi normal mode for it to signal.)
[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"

# Exit code of the last command, shown only on failure, right before the ❯.
# The red ❯ already flags that something failed; this adds the actual code
# (e.g. ✘130 = Ctrl-C, ✘127 = command not found).
[status]
disabled = false
format = "[$symbol$status]($style) "
symbol = "✘"
style = "bold red"

# Background jobs (e.g. after `sleep 5 &`). Hidden when there are none.
[jobs]
symbol = " "
style = "bold blue"
number_threshold = 1

[cmd_duration]
min_time = 500
format = "[ $duration]($style)"
style = "yellow"

# Clock on the right edge. 24h hour:minute, dimmed so it stays in the background.
[time]
disabled = false
format = "[ $time]($style)"
time_format = "%H:%M"
style = "dimmed white"

# Python — the one language module kept. Shows the icon and, when a virtualenv
# is active, its name. $virtualenv comes from $VIRTUAL_ENV (an env var, no
# subprocess — unlike $version), so it's free, and it stops you pip-installing
# into the wrong environment. The other language modules were removed as
# decorative: with the version gone, a node/java/rust icon only says "this is
# an X project", which you already know. Re-add one if you ever want the cue.
[python]
symbol = " "
format = "[$symbol($virtualenv )]($style)"
